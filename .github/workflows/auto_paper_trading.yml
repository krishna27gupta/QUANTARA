name: Autonomous Paper Trading Validation

on:
  schedule:
    # Run at 11:00 AM UTC (4:30 PM IST) every Monday to Friday
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    # Allows manual triggering

permissions:
  contents: write

jobs:
  run-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy lightgbm yfinance pyarrow

      - name: Run Validation Pipeline
        run: |
          python paper_trading/scheduler/daily_runner.py --run-once

      - name: Commit and Push Validation Logs
        run: |
          git config --global user.name "Quantara Autotrader"
          git config --global user.email "quantara-autotrader@users.noreply.github.com"
          git add paper_trading/ docs/performance_report.md
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(auto): update daily paper trading validation logs [skip ci]"
            git push origin main
          else
            echo "No log changes to commit."
          fi
